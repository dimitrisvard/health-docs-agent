name: ci
on: [push, pull_request]

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install -r services/agent/requirements.txt
          pip install -r services/mcp/requirements.txt
          pip install ruff mypy pytest bandit pip-audit
      - name: Lint & types
        run: |
          ruff check services evals
          (cd services/agent && PYTHONPATH=. mypy app) || true   # TODO: tighten once typed
      - name: SAST + dependency audit
        run: |
          bandit -q -r services || true                          # TODO: fail on HIGH severity
          pip-audit || true
      - name: Tests
        run: |
          (cd services/agent && PYTHONPATH=. pytest -q)
          (cd services/mcp && PYTHONPATH=. pytest -q)
          PYTHONPATH=. pytest evals -q
      - name: Evals (retrieval + faithfulness gate)
        # Resilient: run.py skips cleanly when the live MCP/DB/LLM stack or a labelled
        # corpus isn't present, and exits non-zero when a measured metric is below its
        # threshold. Add the ANTHROPIC_API_KEY repo secret + seed a fixture to gate fully.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/services/agent
        run: python -m evals.run

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci || npm install
      - run: npm run lint --if-present
      - run: npm test --if-present
